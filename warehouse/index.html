<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>售后库房管理系统</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{height:100vh;display:flex;align-items:center;justify-content:center;background:#1D1F27;color:#E8E9ED;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;text-align:center;padding:20px;}
    .card{background:#2A2D37;border:1px solid #363946;border-radius:16px;padding:60px 40px;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
    .icon{font-size:64px;margin-bottom:20px;}
    h1{font-size:22px;margin-bottom:8px;}
    p{color:#9CA0AC;font-size:14px;margin-bottom:4px;}
    .tag{display:inline-block;margin-top:16px;padding:4px 16px;border-radius:20px;background:rgba(6,182,212,0.15);color:#06b6d4;font-size:12px;}
    a{display:inline-block;margin-top:24px;padding:10px 24px;border-radius:8px;background:linear-gradient(135deg,#a855f7,#06b6d4);color:white;text-decoration:none;font-weight:500;font-size:14px;transition:all 0.2s;}
    a:hover{box-shadow:0 4px 15px rgba(168,85,247,0.3);transform:translateY(-1px);}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📦</div>
    <h1>售后库房管理系统</h1>
    <p>正在筹备中，敬请期待</p>
    <div class="tag">即将上线</div>
    <a href="../portal/index.html">🏠 返回门户</a>
  </div>
</body>
</html>
